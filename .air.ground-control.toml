[build]
  bin = "bin/ground-control"
  dir = "."
  cmd = "go build -o bin/ground-control ./cmd/ground-control"
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  run_after_build = "chmod +x bin/ground-control"
  include_ext = ["go"]

[log]
  level = "debug"
