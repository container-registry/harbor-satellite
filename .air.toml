[build]
  bin = "bin/satellite"
  dir = "."
  cmd = "go build -o bin/satellite ./cmd/satellite"
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  run_after_build = "chmod +x bin/satellite"
  include_ext = ["go"]

[log]
  level = "debug"
