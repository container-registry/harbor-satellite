name: Lint
on:
  pull_request:
    paths-ignore:
      - "*.md"
      - "assets/**"
jobs:
  lint:
    runs-on: container-registry
    # Run the entire job inside the pinned golangci-lint image.
    # The container-registry runner does not have a working Docker daemon
    # (DOCKER_HOST points at an unreachable DinD sidecar), so docker run
    # cannot be used from within the job. The container: key lets GitHub
    # Actions launch the image on our behalf — no Docker daemon required.
    container:
      # golangci/golangci-lint:v2.12.2 — pinned to immutable digest to match taskfiles/lint.yml
      image: golangci/golangci-lint@sha256:5cceeef04e53efe1470638d4b4b4f5ceefd574955ab3941b2d9a68a8c9ad5240
    env:
      # Keep the cache inside the workspace so it is writable.
      GOLANGCI_LINT_CACHE: ${{ github.workspace }}/.cache/golangci-lint
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run golangci-lint
        run: |
          golangci-lint run -v \
            --output.tab.path=golangci-lint.report \
            --issues-exit-code 0

      - name: Generate lint summary
        run: |
          echo "<h2> Lint results</h2>" >> $GITHUB_STEP_SUMMARY
          cat golangci-lint.report >> $GITHUB_STEP_SUMMARY
          if [ -s golangci-lint.report ]; then
              echo "Linting issues found!" >> $GITHUB_STEP_SUMMARY
              exit 1
          fi

