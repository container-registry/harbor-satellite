name: Lint
on:
  pull_request:
    paths-ignore:
      - "*.md"
      - "assets/**"
jobs:
  lint:
    runs-on: container-registry
    env:
      GOLANGCI_LINT_CACHE: ${{ github.workspace }}/.cache/golangci-lint
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: false

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12
          install-only: true

      - name: Run golangci-lint
        run: task lint-report

      - name: Generate lint summary
        run: |
          echo "<h2> Lint results</h2>" >> $GITHUB_STEP_SUMMARY
          cat golangci-lint.report >> $GITHUB_STEP_SUMMARY
          if [ -s golangci-lint.report ]; then
              echo "Linting issues found!" >> $GITHUB_STEP_SUMMARY
              exit 1
          fi
