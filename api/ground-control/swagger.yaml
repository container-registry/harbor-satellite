swagger: "2.0"
info:
  description: |
    Ground Control manages Harbor Satellite registration, configuration,
    group membership, user administration, status reporting, and SPIRE/SPIFFE
    bootstrap flows.
  title: Ground Control
  version: 0.1.0
consumes:
  - application/json
produces:
  - application/json
schemes:
  - https
basePath: /
securityDefinitions:
  bearerAuth:
    description: "Bearer token authentication. Use the format: Bearer <token>."
    type: apiKey
    name: Authorization
    in: header
paths:
  /api/configs:
    get:
      tags:
        - configs
      summary: Lists satellite configurations.
      operationId: listConfigs
      responses:
        "200":
          description: Configurations returned.
          schema:
            type: array
            items:
              $ref: "#/definitions/APIDatabaseConfig"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Configurations could not be listed.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
    post:
      tags:
        - configs
      summary: Creates a satellite configuration.
      operationId: createConfig
      parameters:
        - description: Configuration creation payload.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/APIConfigObject"
      responses:
        "201":
          description: Configuration created.
        "400":
          description: Configuration payload or name is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "409":
          description: Configuration already exists.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Configuration could not be created.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/configs/satellite:
    post:
      tags:
        - configs
      summary: Sets the configuration assigned to a satellite.
      operationId: setSatelliteConfig
      parameters:
        - description: Satellite configuration assignment payload.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/SatelliteConfigParams"
      responses:
        "200":
          description: Satellite configuration assignment updated.
          schema:
            $ref: "#/definitions/APIEmptyObject"
        "400":
          description: Assignment payload, satellite, or configuration is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Satellite configuration assignment could not be updated.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/configs/{config}:
    get:
      tags:
        - configs
      summary: Gets a satellite configuration.
      operationId: getConfig
      parameters:
        - type: string
          x-go-name: Config
          description: Configuration name.
          name: config
          in: path
          required: true
      responses:
        "200":
          description: Configuration returned.
          schema:
            $ref: "#/definitions/APIDatabaseConfig"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: Configuration was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Configuration could not be loaded.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
    delete:
      tags:
        - configs
      summary: Deletes an unused satellite configuration.
      operationId: deleteConfig
      parameters:
        - type: string
          x-go-name: Config
          description: Configuration name.
          name: config
          in: path
          required: true
      responses:
        "200":
          description: Configuration deleted.
          schema:
            $ref: "#/definitions/APIEmptyObject"
        "400":
          description: Configuration is in use and cannot be deleted.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Configuration could not be deleted.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
    patch:
      tags:
        - configs
      summary: Applies a merge patch to a satellite configuration.
      operationId: updateConfig
      parameters:
        - type: string
          x-go-name: Config
          description: Configuration name.
          name: config
          in: path
          required: true
        - description: Configuration merge patch payload.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/APIConfigValue"
      responses:
        "200":
          description: Configuration updated.
          schema:
            $ref: "#/definitions/APIDatabaseConfig"
        "400":
          description: Configuration name, body, or merge patch is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: Configuration was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Configuration could not be updated.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/groups:
    get:
      tags:
        - groups
      summary: Lists groups.
      operationId: listGroups
      responses:
        "200":
          description: Groups returned.
          schema:
            type: array
            items:
              $ref: "#/definitions/APIGroup"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Groups could not be listed.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/groups/satellite:
    post:
      tags:
        - groups
      summary: Adds a satellite to a group.
      operationId: addSatelliteToGroup
      parameters:
        - description: Satellite and group membership payload.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/SatelliteGroupParams"
      responses:
        "200":
          description: Satellite was added to the group or was already a member.
          schema:
            $ref: "#/definitions/APIMessageResponse"
        "400":
          description: Satellite or group is invalid or not found.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Satellite could not be added to the group.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
    delete:
      tags:
        - groups
      summary: Removes a satellite from a group.
      operationId: removeSatelliteFromGroup
      parameters:
        - description: Satellite and group membership payload.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/SatelliteGroupParams"
      responses:
        "200":
          description: Satellite removed from the group.
          schema:
            $ref: "#/definitions/APIEmptyObject"
        "400":
          description: Satellite or group is invalid or not found.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Satellite could not be removed from the group.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/groups/sync:
    post:
      tags:
        - groups
      summary: Synchronizes a group state artifact.
      operationId: syncGroup
      parameters:
        - description: Group state artifact payload.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/StateArtifact"
      responses:
        "200":
          description: Group synchronized.
          schema:
            $ref: "#/definitions/APIGroup"
        "400":
          description: Group state artifact payload is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Group could not be synchronized.
          schema:
            $ref: "#/definitions/AppError"
        "502":
          description: Harbor project lookup or creation failed.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/groups/{group}:
    get:
      tags:
        - groups
      summary: Gets a group by name.
      operationId: getGroup
      parameters:
        - type: string
          x-go-name: Group
          description: Group name.
          name: group
          in: path
          required: true
      responses:
        "200":
          description: Group returned.
          schema:
            $ref: "#/definitions/APIGroup"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: Group was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Group could not be loaded.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
    delete:
      tags:
        - groups
      summary: Deletes a group.
      operationId: deleteGroup
      parameters:
        - type: string
          x-go-name: Group
          description: Group name.
          name: group
          in: path
          required: true
      responses:
        "200":
          description: Group deleted.
          schema:
            $ref: "#/definitions/APIEmptyObject"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "403":
          description: System administrator role is required.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: Group was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Group could not be deleted.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/groups/{group}/satellites:
    get:
      tags:
        - groups
      summary: Lists satellites attached to a group.
      operationId: listGroupSatellites
      parameters:
        - type: string
          x-go-name: Group
          description: Group name.
          name: group
          in: path
          required: true
      responses:
        "200":
          description: Group satellites returned.
          schema:
            type: array
            items:
              $ref: "#/definitions/APIGroupSatellite"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: Group was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Group satellites could not be listed.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/logout:
    post:
      tags:
        - auth
      summary: Deletes the current user session.
      operationId: logout
      responses:
        "204":
          description: Session deleted.
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Session could not be deleted.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/satellites:
    get:
      tags:
        - satellites
      summary: Lists satellites.
      operationId: listSatellites
      responses:
        "200":
          description: Satellites returned.
          schema:
            type: array
            items:
              $ref: "#/definitions/APISatellite"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Satellites could not be listed.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
    post:
      tags:
        - satellites
      summary: Registers a token-managed satellite.
      operationId: registerSatellite
      parameters:
        - description: Satellite registration payload.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/RegisterSatelliteParams"
      responses:
        "200":
          description: Satellite registered with a zero-touch token.
          schema:
            $ref: "#/definitions/RegisterSatelliteResponse"
        "400":
          description: Registration payload, name, config, or robot account is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Satellite could not be registered.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/satellites/active:
    get:
      tags:
        - satellites
      summary: Lists active satellites.
      operationId: listActiveSatellites
      responses:
        "200":
          description: Active satellites returned.
          schema:
            type: array
            items:
              $ref: "#/definitions/APIActiveSatellite"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Active satellites could not be listed.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/satellites/register:
    post:
      tags:
        - spire
      summary: Registers a satellite workload identity with SPIFFE.
      operationId: registerSatelliteWithSpiffe
      parameters:
        - description: SPIFFE satellite registration payload.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/RegisterSatelliteRequest"
      responses:
        "200":
          description: SPIFFE workload identity registered.
          schema:
            $ref: "#/definitions/RegisterSatelliteWithSPIFFEResponse"
        "400":
          description: Registration payload, selectors, or attestation method is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "403":
          description: System administrator role is required.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: Required parent agent was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: SPIFFE registration could not be completed.
          schema:
            $ref: "#/definitions/AppError"
        "503":
          description: SPIRE server is not configured.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/satellites/stale:
    get:
      tags:
        - satellites
      summary: Lists stale satellites.
      operationId: listStaleSatellites
      responses:
        "200":
          description: Stale satellites returned.
          schema:
            type: array
            items:
              $ref: "#/definitions/APIStaleSatellite"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Stale satellites could not be listed.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/satellites/{satellite}:
    get:
      tags:
        - satellites
      summary: Gets a satellite by name.
      operationId: getSatellite
      parameters:
        - type: string
          x-go-name: Satellite
          description: Satellite name.
          name: satellite
          in: path
          required: true
      responses:
        "200":
          description: Satellite returned.
          schema:
            $ref: "#/definitions/APISatellite"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Satellite could not be loaded.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
    delete:
      tags:
        - satellites
      summary: Deletes a satellite.
      operationId: deleteSatellite
      parameters:
        - type: string
          x-go-name: Satellite
          description: Satellite name.
          name: satellite
          in: path
          required: true
      responses:
        "200":
          description: Satellite deleted.
          schema:
            $ref: "#/definitions/APIEmptyObject"
        "400":
          description: Satellite does not exist or cannot be deleted.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Satellite could not be deleted.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/satellites/{satellite}/images:
    get:
      tags:
        - satellites
      summary: Lists the latest cached images reported by a satellite.
      operationId: getCachedImages
      parameters:
        - type: string
          x-go-name: Satellite
          description: Satellite name.
          name: satellite
          in: path
          required: true
      responses:
        "200":
          description: Cached images returned.
          schema:
            type: array
            items:
              $ref: "#/definitions/APIDatabaseArtifact"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: Satellite was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Cached images could not be loaded.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/satellites/{satellite}/status:
    get:
      tags:
        - satellites
      summary: Gets the latest satellite status report.
      operationId: getSatelliteStatus
      parameters:
        - type: string
          x-go-name: Satellite
          description: Satellite name.
          name: satellite
          in: path
          required: true
      responses:
        "200":
          description: Latest satellite status returned.
          schema:
            $ref: "#/definitions/APISatelliteStatus"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: Satellite or status report was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Satellite status could not be loaded.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/spire/agents:
    get:
      tags:
        - spire
      summary: Lists attested SPIRE agents.
      operationId: listSpireAgents
      parameters:
        - type: string
          x-go-name: AttestationType
          description: Filters agents by attestation type.
          name: attestation_type
          in: query
      responses:
        "200":
          description: SPIRE agents returned.
          schema:
            $ref: "#/definitions/AgentListResponse"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "403":
          description: System administrator role is required.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: SPIRE agents could not be listed.
          schema:
            $ref: "#/definitions/AppError"
        "503":
          description: SPIRE server is not configured.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/spire/status:
    get:
      tags:
        - spire
      summary: Gets SPIRE integration status.
      operationId: getSpireStatus
      responses:
        "200":
          description: SPIRE integration status returned.
          schema:
            $ref: "#/definitions/SPIREStatusResponse"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "403":
          description: System administrator role is required.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/users:
    get:
      tags:
        - users
      summary: Lists non-system users.
      operationId: listUsers
      responses:
        "200":
          description: Users returned.
          schema:
            type: array
            items:
              $ref: "#/definitions/UserResponse"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Users could not be listed.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
    post:
      tags:
        - users
      summary: Creates an admin user.
      operationId: createUser
      parameters:
        - description: User creation request.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/CreateUserRequest"
      responses:
        "201":
          description: User created.
          schema:
            $ref: "#/definitions/UserResponse"
        "400":
          description: Request body, username, or password policy is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "403":
          description: System administrator role is required.
          schema:
            $ref: "#/definitions/AppError"
        "409":
          description: User already exists.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: User could not be created.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/users/password:
    patch:
      tags:
        - users
      summary: Changes the authenticated user's password.
      operationId: changeOwnPassword
      parameters:
        - description: Password change request.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed and sessions invalidated.
        "400":
          description: Request body or new password is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing, invalid, or current password is incorrect.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Password could not be changed.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/users/{username}:
    get:
      tags:
        - users
      summary: Gets a user by username.
      operationId: getUser
      parameters:
        - type: string
          x-go-name: Username
          description: Username.
          name: username
          in: path
          required: true
      responses:
        "200":
          description: User returned.
          schema:
            $ref: "#/definitions/UserResponse"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: User was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: User could not be loaded.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
    delete:
      tags:
        - users
      summary: Deletes a user.
      operationId: deleteUser
      parameters:
        - type: string
          x-go-name: Username
          description: Username.
          name: username
          in: path
          required: true
      responses:
        "204":
          description: User deleted.
        "400":
          description: User cannot be deleted by this request.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "403":
          description: System administrator role is required.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: User was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: User could not be deleted.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /api/users/{username}/password:
    patch:
      tags:
        - users
      summary: Resets a user's password.
      operationId: changeUserPassword
      parameters:
        - type: string
          x-go-name: Username
          description: Username.
          name: username
          in: path
          required: true
        - description: Password reset request.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/ChangeUserPasswordRequest"
      responses:
        "204":
          description: Password reset and user sessions invalidated.
        "400":
          description: Request body or new password is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Authorization token is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "403":
          description: System administrator role is required.
          schema:
            $ref: "#/definitions/AppError"
        "404":
          description: User was not found.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Password could not be reset.
          schema:
            $ref: "#/definitions/AppError"
      security:
        - bearerAuth: []
  /health:
    get:
      tags:
        - health
      summary: Checks database connectivity.
      operationId: health
      responses:
        "200":
          description: Database connection is healthy.
          schema:
            $ref: "#/definitions/APIHealthResponse"
        "503":
          description: Database connection is unavailable.
          schema:
            $ref: "#/definitions/APIHealthResponse"
  /login:
    post:
      tags:
        - auth
      summary: Creates a user session.
      operationId: login
      parameters:
        - description: User credentials.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/LoginRequest"
      responses:
        "200":
          description: Session token created.
          schema:
            $ref: "#/definitions/LoginResponse"
        "400":
          description: Request body is malformed.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Credentials are missing, invalid, or locked out.
          schema:
            $ref: "#/definitions/AppError"
        "429":
          description: Too many login attempts.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Session could not be created.
          schema:
            $ref: "#/definitions/AppError"
  /ping:
    get:
      produces:
        - text/plain
      tags:
        - health
      summary: Pings the server.
      operationId: ping
      responses:
        "200":
          description: Server is reachable and returns pong.
          schema:
            type: string
  /satellites/spiffe-ztr:
    get:
      tags:
        - satellites
      summary: Performs SPIFFE-based zero-touch registration.
      operationId: spiffeZtr
      responses:
        "200":
          description: SPIFFE zero-touch registration completed and registry credentials returned.
          schema:
            $ref: "#/definitions/APIStateConfig"
        "400":
          description: SPIFFE ID format or satellite identity is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: SPIFFE authentication is missing or invalid.
          schema:
            $ref: "#/definitions/AppError"
        "429":
          description: Too many SPIFFE zero-touch registration attempts.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: SPIFFE zero-touch registration could not be completed.
          schema:
            $ref: "#/definitions/AppError"
  /satellites/sync:
    post:
      tags:
        - satellites
      summary: Reports satellite status.
      operationId: syncSatellite
      parameters:
        - description: Satellite status report payload.
          name: Body
          in: body
          required: true
          schema:
            $ref: "#/definitions/SatelliteStatusParams"
      responses:
        "200":
          description: Satellite status report accepted.
        "400":
          description: Status payload or heartbeat interval is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "403":
          description: Satellite identity is unknown or not authorized.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Satellite status report could not be saved.
          schema:
            $ref: "#/definitions/AppError"
  /satellites/ztr/{token}:
    get:
      tags:
        - satellites
      summary: Performs token-based zero-touch registration.
      operationId: ztr
      parameters:
        - type: string
          x-go-name: Token
          description: Single-use zero-touch registration token.
          name: token
          in: path
          required: true
      responses:
        "200":
          description: Zero-touch registration completed and registry credentials returned.
          schema:
            $ref: "#/definitions/APIStateConfig"
        "400":
          description: Registration token is invalid.
          schema:
            $ref: "#/definitions/AppError"
        "401":
          description: Registration token has expired.
          schema:
            $ref: "#/definitions/AppError"
        "429":
          description: Too many zero-touch registration attempts.
          schema:
            $ref: "#/definitions/AppError"
        "500":
          description: Zero-touch registration could not be completed.
          schema:
            $ref: "#/definitions/AppError"
