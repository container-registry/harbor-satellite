swagger: '2.0'
info:
  title: Harbor Satellite Ground Control API
  version: '1.0'
  description: >-
    Ground Control management API. Bearer authentication is the recommended
    workflow for interactive clients. Basic authentication remains supported on
    authenticated human endpoints for automation compatibility.
basePath: /
schemes:
  - https
  - http
consumes:
  - application/json
produces:
  - application/json
tags:
  - name: system
  - name: auth
  - name: users
  - name: satellites
  - name: groups
  - name: configs
securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: Use `Bearer <token>`.
  BasicAuth:
    type: basic
definitions:
  PingResponse:
    type: string
    example: pong
  HealthResponse:
    type: object
    required:
      - status
    properties:
      status:
        type: string
        enum:
          - healthy
          - unhealthy
  LoginRequest:
    type: object
    required:
      - username
      - password
    properties:
      username:
        type: string
      password:
        type: string
        format: password
  LoginResponse:
    type: object
    required:
      - token
      - expires_at
    properties:
      token:
        type: string
      expires_at:
        type: string
        format: date-time
  CreateUserRequest:
    type: object
    required:
      - username
      - password
    properties:
      username:
        type: string
      password:
        type: string
        format: password
  ChangeOwnPasswordRequest:
    type: object
    required:
      - current_password
      - new_password
    properties:
      current_password:
        type: string
        format: password
      new_password:
        type: string
        format: password
  ChangeUserPasswordRequest:
    type: object
    required:
      - new_password
    properties:
      new_password:
        type: string
        format: password
  User:
    type: object
    required:
      - id
      - username
      - role
      - created_at
    properties:
      id:
        type: integer
        format: int32
      username:
        type: string
      role:
        type: string
      created_at:
        type: string
        format: date-time
  Users:
    type: array
    items:
      $ref: '#/definitions/User'
  ErrorResponse:
    type: object
    required:
      - error
    properties:
      error:
        type: string
  MessageResponse:
    type: object
    properties:
      message:
        type: string
  Satellite:
    type: object
    required:
      - id
      - name
      - created_at
      - updated_at
    properties:
      id:
        type: integer
        format: int32
      name:
        type: string
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      last_seen:
        type: string
        format: date-time
        x-nullable: true
      heartbeat_interval:
        type: string
        x-nullable: true
  Satellites:
    type: array
    items:
      $ref: '#/definitions/Satellite'
  RegisterSatelliteRequest:
    type: object
    required:
      - name
      - config_name
    properties:
      name:
        type: string
      groups:
        type: array
        items:
          type: string
      config_name:
        type: string
  RegisterSatelliteResponse:
    type: object
    required:
      - token
    properties:
      token:
        type: string
  SatelliteStatus:
    type: object
    properties:
      id:
        type: integer
        format: int32
      satellite_id:
        type: integer
        format: int32
      activity:
        type: string
      latest_state_digest:
        type: string
        x-nullable: true
      latest_config_digest:
        type: string
        x-nullable: true
      cpu_percent:
        type: string
        x-nullable: true
      memory_used_bytes:
        type: integer
        format: int64
        x-nullable: true
      storage_used_bytes:
        type: integer
        format: int64
        x-nullable: true
      last_sync_duration_ms:
        type: integer
        format: int64
        x-nullable: true
      image_count:
        type: integer
        format: int32
        x-nullable: true
      reported_at:
        type: string
        format: date-time
      created_at:
        type: string
        format: date-time
  CachedArtifact:
    type: object
    properties:
      id:
        type: integer
        format: int32
      reference:
        type: string
      size_bytes:
        type: integer
        format: int64
      created_at:
        type: string
        format: date-time
  Group:
    type: object
    required:
      - id
      - group_name
      - registry_url
      - created_at
      - updated_at
    properties:
      id:
        type: integer
        format: int32
      group_name:
        type: string
      registry_url:
        type: string
      projects:
        type: array
        items:
          type: string
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
  Groups:
    type: array
    items:
      $ref: '#/definitions/Group'
  GroupArtifact:
    type: object
    properties:
      repository:
        type: string
      tag:
        type: array
        items:
          type: string
      labels:
        type: object
      type:
        type: string
      digest:
        type: string
      deleted:
        type: boolean
  GroupSyncRequest:
    type: object
    required:
      - group
    properties:
      group:
        type: string
      registry:
        type: string
      artifacts:
        type: array
        items:
          $ref: '#/definitions/GroupArtifact'
  SatelliteGroupRequest:
    type: object
    required:
      - satellite
      - group
    properties:
      satellite:
        type: string
      group:
        type: string
  Config:
    type: object
    required:
      - id
      - config_name
      - registry_url
      - created_at
      - updated_at
    properties:
      id:
        type: integer
        format: int32
      config_name:
        type: string
      registry_url:
        type: string
      config:
        type: object
        description: Satellite configuration (state_config, app_config, zot_config)
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
  Configs:
    type: array
    items:
      $ref: '#/definitions/Config'
  CreateConfigRequest:
    type: object
    required:
      - config_name
    properties:
      config_name:
        type: string
      registry:
        type: string
      config:
        type: object
        description: Satellite configuration object with state_config, app_config, and zot_config
  UpdateConfigRequest:
    type: object
    description: Partial config object used as a JSON merge patch
    properties:
      state_config:
        type: object
      app_config:
        type: object
      zot_config:
        type: object
  SatelliteConfigRequest:
    type: object
    required:
      - satellite
      - config_name
    properties:
      satellite:
        type: string
      config_name:
        type: string
paths:
  /ping:
    get:
      tags:
        - system
      operationId: ping
      summary: Ping Ground Control
      responses:
        '200':
          description: Pong response
          schema:
            $ref: '#/definitions/PingResponse'
  /health:
    get:
      tags:
        - system
      operationId: getHealth
      summary: Get service health
      responses:
        '200':
          description: Service is healthy
          schema:
            $ref: '#/definitions/HealthResponse'
        '503':
          description: Service is unhealthy
          schema:
            $ref: '#/definitions/HealthResponse'
  /login:
    post:
      tags:
        - auth
      operationId: login
      summary: Create a session token
      parameters:
        - in: body
          name: credentials
          required: true
          schema:
            $ref: '#/definitions/LoginRequest'
      responses:
        '200':
          description: Session created
          schema:
            $ref: '#/definitions/LoginResponse'
        '400':
          description: Invalid request body
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Invalid credentials
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/logout:
    post:
      tags:
        - auth
      operationId: logout
      summary: Delete the current session
      description: Requires a bearer token for session invalidation.
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Session deleted
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/users:
    get:
      tags:
        - users
      operationId: listUsers
      summary: List users
      description: Bearer auth is recommended. Basic auth remains supported.
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Users listed
          schema:
            $ref: '#/definitions/Users'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
    post:
      tags:
        - users
      operationId: createUser
      summary: Create a user
      description: Requires a system admin user. Bearer auth is recommended.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: body
          name: user
          required: true
          schema:
            $ref: '#/definitions/CreateUserRequest'
      responses:
        '201':
          description: User created
          schema:
            $ref: '#/definitions/User'
        '400':
          description: Invalid request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: User already exists
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/users/password:
    patch:
      tags:
        - users
      operationId: changeOwnPassword
      summary: Change the current user's password
      description: Bearer auth is recommended. Basic auth remains supported.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: body
          name: password
          required: true
          schema:
            $ref: '#/definitions/ChangeOwnPasswordRequest'
      responses:
        '204':
          description: Password changed and sessions invalidated
        '400':
          description: Invalid request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized or current password incorrect
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/users/{username}:
    parameters:
      - name: username
        in: path
        required: true
        type: string
    get:
      tags:
        - users
      operationId: getUser
      summary: Get a user by username
      description: Bearer auth is recommended. Basic auth remains supported.
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: User found
          schema:
            $ref: '#/definitions/User'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: User not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
    delete:
      tags:
        - users
      operationId: deleteUser
      summary: Delete a user
      description: Requires a system admin user. Bearer auth is recommended.
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '204':
          description: User deleted
        '400':
          description: Invalid request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: User not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/users/{username}/password:
    parameters:
      - name: username
        in: path
        required: true
        type: string
    patch:
      tags:
        - users
      operationId: changeUserPassword
      summary: Change another user's password
      description: Requires a system admin user. Bearer auth is recommended.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: body
          name: password
          required: true
          schema:
            $ref: '#/definitions/ChangeUserPasswordRequest'
      responses:
        '204':
          description: Password changed and sessions invalidated
        '400':
          description: Invalid request
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '403':
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: User not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  # ── Satellite endpoints ──────────────────────────────────────────
  /api/satellites:
    get:
      tags:
        - satellites
      operationId: listSatellites
      summary: List all satellites
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Satellites listed
          schema:
            $ref: '#/definitions/Satellites'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
    post:
      tags:
        - satellites
      operationId: registerSatellite
      summary: Register a new satellite
      description: >
        Registers a satellite, creates a Harbor robot account, and returns
        a one-time Zero-Touch Registration token. Disabled when SPIFFE
        authentication is enabled.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: body
          name: satellite
          required: true
          schema:
            $ref: '#/definitions/RegisterSatelliteRequest'
      responses:
        '200':
          description: Satellite registered
          schema:
            $ref: '#/definitions/RegisterSatelliteResponse'
        '400':
          description: Invalid request or SPIFFE is enabled
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/satellites/active:
    get:
      tags:
        - satellites
      operationId: getActiveSatellites
      summary: List satellites that reported recently
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Active satellites listed
          schema:
            $ref: '#/definitions/Satellites'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/satellites/stale:
    get:
      tags:
        - satellites
      operationId: getStaleSatellites
      summary: List satellites that have not reported recently
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Stale satellites listed
          schema:
            $ref: '#/definitions/Satellites'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/satellites/{satellite}:
    parameters:
      - name: satellite
        in: path
        required: true
        type: string
    get:
      tags:
        - satellites
      operationId: getSatellite
      summary: Get a satellite by name
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Satellite found
          schema:
            $ref: '#/definitions/Satellite'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Satellite not found or internal error
          schema:
            $ref: '#/definitions/ErrorResponse'
    delete:
      tags:
        - satellites
      operationId: deleteSatellite
      summary: Delete a satellite
      description: >
        Deletes the satellite record, its Harbor robot account, and the
        associated state artifact.
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Satellite deleted
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/satellites/{satellite}/status:
    parameters:
      - name: satellite
        in: path
        required: true
        type: string
    get:
      tags:
        - satellites
      operationId: getSatelliteStatus
      summary: Get latest status for a satellite
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Status returned
          schema:
            $ref: '#/definitions/SatelliteStatus'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Satellite or status not found
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/satellites/{satellite}/images:
    parameters:
      - name: satellite
        in: path
        required: true
        type: string
    get:
      tags:
        - satellites
      operationId: getCachedImages
      summary: Get cached images for a satellite
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Cached images listed
          schema:
            type: array
            items:
              $ref: '#/definitions/CachedArtifact'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Satellite not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  # ── Group endpoints ──────────────────────────────────────────────
  /api/groups:
    get:
      tags:
        - groups
      operationId: listGroups
      summary: List all groups
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Groups listed
          schema:
            $ref: '#/definitions/Groups'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/groups/sync:
    post:
      tags:
        - groups
      operationId: syncGroup
      summary: Create or update a group with its artifact list
      description: >
        Creates the group if it does not exist, updates its artifact list,
        syncs Harbor robot account permissions, and pushes an OCI state
        artifact.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: body
          name: group
          required: true
          schema:
            $ref: '#/definitions/GroupSyncRequest'
      responses:
        '200':
          description: Group synced
          schema:
            $ref: '#/definitions/Group'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
        '502':
          description: Harbor registry unreachable
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/groups/{group}:
    parameters:
      - name: group
        in: path
        required: true
        type: string
    get:
      tags:
        - groups
      operationId: getGroup
      summary: Get a group by name
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Group found
          schema:
            $ref: '#/definitions/Group'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Group not found
          schema:
            $ref: '#/definitions/ErrorResponse'
    delete:
      tags:
        - groups
      operationId: deleteGroup
      summary: Delete a group
      description: Requires system admin role.
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Group deleted
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '403':
          description: Forbidden – requires system admin
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/groups/{group}/satellites:
    parameters:
      - name: group
        in: path
        required: true
        type: string
    get:
      tags:
        - groups
      operationId: listGroupSatellites
      summary: List satellites in a group
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Satellites listed
          schema:
            $ref: '#/definitions/Satellites'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Group not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  /api/groups/satellite:
    post:
      tags:
        - groups
      operationId: addSatelliteToGroup
      summary: Add a satellite to a group
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/SatelliteGroupRequest'
      responses:
        '200':
          description: Satellite added to group
          schema:
            $ref: '#/definitions/MessageResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
    delete:
      tags:
        - groups
      operationId: removeSatelliteFromGroup
      summary: Remove a satellite from a group
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/SatelliteGroupRequest'
      responses:
        '200':
          description: Satellite removed from group
          schema:
            type: object
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
  # ── Config endpoints ─────────────────────────────────────────────
  /api/configs:
    get:
      tags:
        - configs
      operationId: listConfigs
      summary: List all configs
      security:
        - BearerAuth: []
        - BasicAuth: []
      responses:
        '200':
          description: Configs listed
          schema:
            $ref: '#/definitions/Configs'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/ErrorResponse'
    post:
      tags:
        - configs
      operationId: createConfig
      summary: Create a config
      description: >
        Creates a new satellite configuration and pushes it as an OCI
        artifact to Harbor.
      security:
        - BearerAuth: []
        - BasicAuth: []
      parameters:
        - in: body
          name: config
          required: true
          schema:
            $ref: '#/definitions/CreateConfigRequest'
      responses:
        '201':
          description: Config created
        '400':
          description: Invalid config name
          schema:
            $ref: '#/definitions/ErrorResponse'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Config already exists
          schema:
            $ref: '#/definitions/ErrorResponse'
