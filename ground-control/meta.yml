swagger: "2.0"
info:
  title: Ground Control API
  description: |
    Ground Control manages Harbor Satellite registration, configuration,
    group membership, user administration, status reporting, and SPIRE/SPIFFE
    bootstrap flows.
  version: 0.1.0
basePath: /
schemes:
  - http
  - https
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header
