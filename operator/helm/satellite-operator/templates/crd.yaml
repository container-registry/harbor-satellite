{{- if .Values.installCRDs }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: satellites.harbor.registry
  labels:
    app.kubernetes.io/name: satellite-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- if .Values.crdAnnotations }}
    annotations:
      {{- toYaml .Values.crdAnnotations | nindent 6 }}
    {{- end }}
spec:
  group: harbor.registry
  names:
    kind: Satellite
    listKind: SatelliteList
    plural: satellites
    singular: satellite
    shortNames:
      - sat
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                group:
                  type: string
                configName:
                  type: string
                groundControlURL:
                  type: string
                token:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Registered
                    - Failed
                    - Terminating
                registered:
                  type: boolean
                tokenRef:
                  type: string
                message:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Registered
          type: boolean
          jsonPath: .status.registered
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
