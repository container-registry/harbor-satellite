apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: satellite-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-manager-role
  labels:
    app.kubernetes.io/name: satellite-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups:
      - harbor.registry
    resources:
      - satellites
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - harbor.registry
    resources:
      - satellites/finalizers
    verbs:
      - update
  - apiGroups:
      - harbor.registry
    resources:
      - satellites/status
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-manager-rolebinding
  labels:
    app.kubernetes.io/name: satellite-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-controller-manager
    namespace: {{ .Release.Namespace }}
