          type: string
          format: date-time
        LastSeen:
          $ref: "#/components/schemas/NullableTimeValue"
        HeartbeatInterval:
          $ref: "#/components/schemas/NullableStringValue"
        LastActivity:
          type: string
        LastStatusTime:
          type: string
          format: date-time
    AppConfig:
      type: object
      title: AppConfig contains Harbor Satellite application settings.
      properties:
        ground_control_url:
          type: string
          x-go-name: GroundControlURL
        log_level:
          type: string
          x-go-name: LogLevel
        use_unsecure:
          type: boolean
          x-go-name: UseUnsecure
        state_replication_interval:
          type: string
          x-go-name: StateReplicationInterval
        register_satellite_interval:
          type: string
          x-go-name: RegisterSatelliteInterval
        heartbeat_interval:
          type: string
          x-go-name: HeartbeatInterval
        metrics:
          $ref: "#/components/schemas/MetricsConfig"
        bring_own_registry:
          type: boolean
          x-go-name: BringOwnRegistry
        local_registry:
          $ref: "#/components/schemas/RegistryCredentials"
        tls:
          $ref: "#/components/schemas/TLSConfig"
        spiffe:
          $ref: "#/components/schemas/SPIFFEClientConfig"
        encrypt_config:
          type: boolean
          x-go-name: EncryptConfig
        registry_fallback:
          $ref: "#/components/schemas/RegistryFallbackConfig"
        harbor_registry_url:
          type: string
          x-go-name: HarborRegistryURL
        direct_delivery:
          $ref: "#/components/schemas/DirectDeliveryConfig"
        audit:
          $ref: "#/components/schemas/AuditConfig"
    AuditConfig:
      type: object
      title: AuditConfig controls satellite security-event audit logging.
      properties:
        enabled:
          type: boolean
          x-go-name: Enabled
        syslog:
          $ref: "#/components/schemas/SyslogAuditConfig"
        otel:
          $ref: "#/components/schemas/OTelAuditConfig"
    CachedArtifactResponse:
      type: object
