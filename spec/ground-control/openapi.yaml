              schema:
                $ref: "#/components/schemas/AppError"
servers:
  - url: /
components:
  requestBodies:
    SatelliteGroupRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SatelliteGroupRequest"
