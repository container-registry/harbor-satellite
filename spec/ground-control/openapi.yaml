openapi: 3.0.0
info:
  description: |
    Ground Control manages Harbor Satellite registration, configuration,
    group membership, user administration, status reporting, and SPIRE/SPIFFE
    bootstrap flows. JSON schemas describe the public transport contract and
    are intentionally independent of the Ground Control database schema.
  title: Ground Control
  version: 0.1.0
paths:
  /api/configs:
    get:
      tags:
        - configs
      summary: Lists satellite configurations.
      operationId: listConfigs
      responses:
        "200":
          description: Configurations returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConfigResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Configurations could not be listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
    post:
      tags:
        - configs
      summary: Creates a satellite configuration.
      operationId: createConfig
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigCreateRequest"
        description: Configuration creation payload.
        required: true
      responses:
        "201":
          description: Configuration created.
        "400":
          description: Configuration payload or name is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "409":
          description: Configuration already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Configuration could not be created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/configs/satellite:
    post:
      tags:
        - configs
      summary: Sets the configuration assigned to a satellite.
      operationId: setSatelliteConfig
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SatelliteConfigRequest"
        description: Satellite configuration assignment payload.
        required: true
      responses:
        "200":
          description: Satellite configuration assignment updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "400":
          description: Assignment payload, satellite, or configuration is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Satellite configuration assignment could not be updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  "/api/configs/{config}":
    get:
      tags:
        - configs
      summary: Gets a satellite configuration.
      operationId: getConfig
      parameters:
        - x-go-name: Config
          description: Configuration name.
          name: config
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Configuration returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Configuration was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Configuration could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
    delete:
      tags:
        - configs
      summary: Deletes an unused satellite configuration.
      operationId: deleteConfig
      parameters:
        - x-go-name: Config
          description: Configuration name.
          name: config
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Configuration deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "400":
          description: Configuration is in use and cannot be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Configuration could not be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
    patch:
      tags:
        - configs
      summary: Applies a merge patch to a satellite configuration.
      operationId: updateConfig
      parameters:
        - x-go-name: Config
          description: Configuration name.
          name: config
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigMergePatch"
        description: Configuration merge patch payload.
        required: true
      responses:
        "200":
          description: Configuration updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "400":
          description: Configuration name, body, or merge patch is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Configuration was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Configuration could not be updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/groups:
    get:
      tags:
        - groups
      summary: Lists groups.
      operationId: listGroups
      responses:
        "200":
          description: Groups returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Groups could not be listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/groups/satellite:
    post:
      tags:
        - groups
      summary: Adds a satellite to a group.
      operationId: addSatelliteToGroup
      requestBody:
        $ref: "#/components/requestBodies/SatelliteGroupRequest"
      responses:
        "200":
          description: Satellite was added to the group or was already a member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Satellite or group is invalid or not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Satellite could not be added to the group.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
    delete:
      tags:
        - groups
      summary: Removes a satellite from a group.
      operationId: removeSatelliteFromGroup
      requestBody:
        $ref: "#/components/requestBodies/SatelliteGroupRequest"
      responses:
        "200":
          description: Satellite removed from the group.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "400":
          description: Satellite or group is invalid or not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Satellite could not be removed from the group.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/groups/sync:
    post:
      tags:
        - groups
      summary: Synchronizes a group state artifact.
      operationId: syncGroup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupSyncRequest"
        description: Group state artifact payload.
        required: true
      responses:
        "200":
          description: Group synchronized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "400":
          description: Group state artifact payload is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Group could not be synchronized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Harbor project lookup, creation, or group state artifact push failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  "/api/groups/{group}":
    get:
      tags:
        - groups
      summary: Gets a group by name.
      operationId: getGroup
      parameters:
        - x-go-name: Group
          description: Group name.
          name: group
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Group was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Group could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
    delete:
      tags:
        - groups
      summary: Deletes a group.
      operationId: deleteGroup
      parameters:
        - x-go-name: Group
          description: Group name.
          name: group
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: System administrator role is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Group was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Group could not be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  "/api/groups/{group}/satellites":
    get:
      tags:
        - groups
      summary: Lists satellites attached to a group.
      operationId: listGroupSatellites
      parameters:
        - x-go-name: Group
          description: Group name.
          name: group
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group satellites returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupSatelliteResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Group was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Group satellites could not be listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/logout:
    post:
      tags:
        - auth
      summary: Deletes the current user session.
      operationId: logout
      responses:
        "204":
          description: Session deleted.
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Session could not be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/satellites:
    get:
      tags:
        - satellites
      summary: Lists satellites.
      operationId: listSatellites
      responses:
        "200":
          description: Satellites returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SatelliteResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Satellites could not be listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
    post:
      tags:
        - satellites
      summary: Registers a token-managed satellite.
      operationId: registerSatellite
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenSatelliteRegistrationRequest"
        description: Satellite registration payload.
        required: true
      responses:
        "200":
          description: Satellite registered with a zero-touch token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenSatelliteRegistrationResponse"
        "400":
          description: Registration payload, name, config, or robot account is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Satellite could not be registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/satellites/active:
    get:
      tags:
        - satellites
      summary: Lists active satellites.
      operationId: listActiveSatellites
      responses:
        "200":
          description: Active satellites returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveSatelliteResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Active satellites could not be listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/satellites/register:
    post:
      tags:
        - spire
      summary: Registers a satellite workload identity with SPIFFE.
      operationId: registerSatelliteWithSpiffe
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SPIFFESatelliteRegistrationRequest"
        description: SPIFFE satellite registration payload.
        required: true
      responses:
        "200":
          description: SPIFFE workload identity registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SPIFFESatelliteRegistrationResponse"
        "400":
          description: Registration payload, selectors, or attestation method is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: System administrator role is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Required parent agent was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: SPIFFE registration could not be completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: SPIRE server is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/satellites/stale:
    get:
      tags:
        - satellites
      summary: Lists stale satellites.
      operationId: listStaleSatellites
      responses:
        "200":
          description: Stale satellites returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaleSatelliteResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Stale satellites could not be listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  "/api/satellites/{satellite}":
    get:
      tags:
        - satellites
      summary: Gets a satellite by name.
      operationId: getSatellite
      parameters:
        - x-go-name: Satellite
          description: Satellite name.
          name: satellite
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Satellite returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SatelliteResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Satellite could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
    delete:
      tags:
        - satellites
      summary: Deletes a satellite.
      operationId: deleteSatellite
      parameters:
        - x-go-name: Satellite
          description: Satellite name.
          name: satellite
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Satellite deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyResponse"
        "400":
          description: Satellite does not exist or cannot be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Satellite could not be deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  "/api/satellites/{satellite}/images":
    get:
      tags:
        - satellites
      summary: Lists the latest cached images reported by a satellite.
      operationId: getCachedImages
      parameters:
        - x-go-name: Satellite
          description: Satellite name.
          name: satellite
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cached images returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CachedArtifactResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Satellite was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Cached images could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  "/api/satellites/{satellite}/status":
    get:
      tags:
        - satellites
      summary: Gets the latest satellite status report.
      operationId: getSatelliteStatus
      parameters:
        - x-go-name: Satellite
          description: Satellite name.
          name: satellite
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Latest satellite status returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SatelliteStatusResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Satellite or status report was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Satellite status could not be loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/spire/agents:
    get:
      tags:
        - spire
      summary: Lists attested SPIRE agents.
      operationId: listSpireAgents
      parameters:
        - x-go-name: AttestationType
          description: Filters agents by attestation type.
          name: attestation_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: SPIRE agents returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: System administrator role is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: SPIRE agents could not be listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: SPIRE server is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/spire/status:
    get:
      tags:
        - spire
      summary: Gets SPIRE integration status.
      operationId: getSpireStatus
      responses:
        "200":
          description: SPIRE integration status returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SPIREStatusResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: System administrator role is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
  /api/users:
    get:
      tags:
        - users
      summary: Lists non-system users.
      operationId: listUsers
      responses:
        "200":
          description: Users returned.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Users could not be listed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
        - tokenAuth: []
    post:
      tags:
        - users
      summary: Creates an admin user.
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
        description: User creation request.
        required: true
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Request body, username, or password policy is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Authorization token is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
