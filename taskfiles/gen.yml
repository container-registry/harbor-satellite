version: "3"

vars:
  OAPI_CODEGEN_CONFIG_DIR: "{{.ROOT_DIR}}/spec/ground-control/oapi-codegen"
  GC_OPENAPI_SPEC: "{{.ROOT_DIR}}/spec/ground-control/openapi.yaml"
  GC_SERVER_CONFIG: "{{.OAPI_CODEGEN_CONFIG_DIR}}/server.cfg.yaml"
  GC_SERVER_OUTPUT_DIR: "{{.ROOT_DIR}}/internal/groundcontrol/server"
  GC_SERVER_OUTPUT: "{{.GC_SERVER_OUTPUT_DIR}}/server.gen.go"
  GC_CLIENT_CONFIG: "{{.OAPI_CODEGEN_CONFIG_DIR}}/client.cfg.yaml"
  GC_CLIENT_OUTPUT_DIR: "{{.ROOT_DIR}}/pkg/ground-control"
  GC_CLIENT_OUTPUT: "{{.GC_CLIENT_OUTPUT_DIR}}/client.gen.go"

tasks:
  oapi-codegen:install:
    internal: true
    desc: Install oapi-codegen
    env:
      GOBIN: "{{.BIN_DIR}}"
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
    status:
      - test -x {{.BIN_DIR}}/oapi-codegen

  ground-control:
    desc: Generate Ground Control OpenAPI server and client code
    cmds:
      - task: ground-control-server
      - task: ground-control-client

  ground-control-server:
    desc: Generate Ground Control OpenAPI server code
    cmds:
      - task: oapi-codegen:install
      - mkdir -p "{{.GC_SERVER_OUTPUT_DIR}}"
      - '"{{.BIN_DIR}}/oapi-codegen" -config "{{.GC_SERVER_CONFIG}}" -o "{{.GC_SERVER_OUTPUT}}" "{{.GC_OPENAPI_SPEC}}"'
    sources:
      - "{{.GC_OPENAPI_SPEC}}"
      - "{{.GC_SERVER_CONFIG}}"
    generates:
      - "{{.GC_SERVER_OUTPUT}}"

  ground-control-client:
    desc: Generate Ground Control OpenAPI client code
    cmds:
      - task: oapi-codegen:install
      - mkdir -p "{{.GC_CLIENT_OUTPUT_DIR}}"
      - '"{{.BIN_DIR}}/oapi-codegen" -config "{{.GC_CLIENT_CONFIG}}" -o "{{.GC_CLIENT_OUTPUT}}" "{{.GC_OPENAPI_SPEC}}"'
    sources:
      - "{{.GC_OPENAPI_SPEC}}"
      - "{{.GC_CLIENT_CONFIG}}"
    generates:
      - "{{.GC_CLIENT_OUTPUT}}"
