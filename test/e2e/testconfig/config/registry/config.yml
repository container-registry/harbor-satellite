# file edited for dev config
version: 0.1
storage:
  cache:
    layerinfo: redis
  filesystem:
    rootdirectory: /storage
  maintenance:
    uploadpurging:
      enabled: true
      age: 168h
      interval: 24h
      dryrun: false
  delete:
    enabled: true
redis:
  addrs:
    - redis:6379
  readtimeout: 10s
  writetimeout: 10s
  dialtimeout: 10s
  password:
  db: 1
  maxidleconns: 100
  maxactiveconns: 500
  connmaxidletime: 60s
http:
  addr: :5000
  secret: placeholder
  debug:
    addr: localhost:5001
validation:
  disabled: true
compatibility:
  schema1:
    enabled: true
auth:
  htpasswd:
    realm: harbor-registry-basic-realm
    path: /etc/registry/passwd
