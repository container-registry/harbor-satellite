<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 640" width="1440" height="640" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A6E"/>
    </marker>
  </defs>

  <!-- Sources -->
  <rect x="40" y="150" width="230" height="90" rx="10" fill="#ffffff" stroke="#1F3A6E" stroke-width="2.5"/>
  <text x="155" y="188" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F3A6E">Satellite</text>
  <text x="155" y="216" text-anchor="middle" font-size="15" fill="#444444">edge registry</text>

  <rect x="40" y="350" width="230" height="90" rx="10" fill="#ffffff" stroke="#1F3A6E" stroke-width="2.5"/>
  <text x="155" y="388" text-anchor="middle" font-size="22" font-weight="bold" fill="#1F3A6E">Ground Control</text>
  <text x="155" y="416" text-anchor="middle" font-size="15" fill="#444444">central management</text>

  <!-- Arrows sources -> logger -->
  <line x1="270" y1="195" x2="355" y2="265" stroke="#1F3A6E" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="395" x2="355" y2="325" stroke="#1F3A6E" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="312" y="305" text-anchor="middle" font-size="14" fill="#666666">audit events</text>

  <!-- Audit logger -->
  <rect x="365" y="240" width="240" height="110" rx="10" fill="#EEF2FA" stroke="#1F3A6E" stroke-width="2.5"/>
  <text x="485" y="285" text-anchor="middle" font-size="21" font-weight="bold" fill="#1F3A6E">Audit logger</text>
  <text x="485" y="312" text-anchor="middle" font-size="15" fill="#444444">canonical JSON event</text>
  <text x="485" y="332" text-anchor="middle" font-size="15" fill="#444444">17 fields, one line each</text>

  <!-- Arrows logger -> transports -->
  <line x1="605" y1="270" x2="685" y2="185" stroke="#1F3A6E" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="605" y1="320" x2="685" y2="430" stroke="#1F3A6E" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Syslog transport -->
  <rect x="695" y="130" width="270" height="100" rx="10" fill="#ffffff" stroke="#1F3A6E" stroke-width="2.5"/>
  <text x="830" y="172" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F3A6E">Syslog transport</text>
  <text x="830" y="200" text-anchor="middle" font-size="15" fill="#444444">RFC 5424, JSON in message</text>

  <!-- OTel transport -->
  <rect x="695" y="400" width="270" height="100" rx="10" fill="#ffffff" stroke="#1F3A6E" stroke-width="2.5"/>
  <text x="830" y="442" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F3A6E">OpenTelemetry transport</text>
  <text x="830" y="470" text-anchor="middle" font-size="15" fill="#444444">OTLP/HTTP, first-class attributes</text>

  <!-- Arrows syslog -> targets -->
  <line x1="965" y1="160" x2="1055" y2="90" stroke="#1F3A6E" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="965" y1="180" x2="1055" y2="180" stroke="#1F3A6E" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="965" y1="200" x2="1055" y2="270" stroke="#1F3A6E" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Syslog targets -->
  <rect x="1065" y="55" width="335" height="66" rx="8" fill="#EEF2FA" stroke="#1F3A6E" stroke-width="2"/>
  <text x="1080" y="83" font-size="17" font-weight="bold" fill="#1F3A6E">target: daemon</text>
  <text x="1080" y="106" font-size="14" fill="#444444">local syslog socket (/dev/log)</text>

  <rect x="1065" y="147" width="335" height="66" rx="8" fill="#EEF2FA" stroke="#1F3A6E" stroke-width="2"/>
  <text x="1080" y="175" font-size="17" font-weight="bold" fill="#1F3A6E">target: network</text>
  <text x="1080" y="198" font-size="14" fill="#444444">SIEM endpoint, udp/tcp host:port</text>

  <rect x="1065" y="239" width="335" height="66" rx="8" fill="#EEF2FA" stroke="#1F3A6E" stroke-width="2"/>
  <text x="1080" y="267" font-size="17" font-weight="bold" fill="#1F3A6E">target: file</text>
  <text x="1080" y="290" font-size="14" fill="#444444">rotated log file + any log shipper</text>

  <!-- Arrow otel -> collector -->
  <line x1="965" y1="450" x2="1055" y2="450" stroke="#1F3A6E" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- OTel destination -->
  <rect x="1065" y="405" width="335" height="90" rx="8" fill="#EEF2FA" stroke="#1F3A6E" stroke-width="2"/>
  <text x="1080" y="438" font-size="17" font-weight="bold" fill="#1F3A6E">OpenTelemetry Collector</text>
  <text x="1080" y="462" font-size="14" fill="#444444">export anywhere: Grafana Loki,</text>
  <text x="1080" y="482" font-size="14" fill="#444444">Splunk, OpenSearch, ...</text>

  <!-- Footnote -->
  <text x="720" y="600" text-anchor="middle" font-size="14" fill="#888888">Both transports can run at the same time; every event is delivered to each enabled transport.</text>
</svg>
